name: Build Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  actions: read
  pull-requests: write

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "21"
  VERSION_NAME: 0.0.0-ci
  VERSION_CODE: "1"

jobs:
  android:
    name: Android build test
    runs-on: ubuntu-latest
    outputs:
      package-id: ${{ steps.android_package.outputs.artifact-id }}
      log-id: ${{ steps.android_logs.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          npm ci 2>&1 | tee ci-logs/npm-ci.log

      - name: Sync Capacitor
        shell: bash
        run: |
          set -o pipefail
          npm run sync 2>&1 | tee ci-logs/capacitor-sync.log

      # assembleDebug uses the disposable debug keystore generated on this runner.
      # It deliberately does not read a release key or any signing secret.
      - name: Build temporarily signed Android APK
        shell: bash
        working-directory: android
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../ci-logs/android-build.log

      - name: Collect Android package
        if: ${{ success() }}
        shell: bash
        run: |
          mkdir -p ci-artifacts/android
          cp android/app/build/outputs/apk/debug/app-debug.apk \
            ci-artifacts/android/win12-mobile-pr-${{ github.event.pull_request.number || github.run_number }}.apk

      - name: Upload Android package
        id: android_package
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-install-package
          path: ci-artifacts/android/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Android failure logs
        id: android_logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: android-failure-logs
          path: ci-logs/
          if-no-files-found: ignore
          retention-days: 7

  ios:
    name: iOS build test
    runs-on: macos-latest
    outputs:
      package-id: ${{ steps.ios_package.outputs.artifact-id }}
      log-id: ${{ steps.ios_logs.outputs.artifact-id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          mkdir -p ci-logs
          npm ci 2>&1 | tee ci-logs/npm-ci.log

      - name: Sync Capacitor
        shell: bash
        run: |
          set -o pipefail
          npm run sync 2>&1 | tee ci-logs/capacitor-sync.log

      - name: Install CocoaPods dependencies
        shell: bash
        working-directory: ios/App
        run: |
          set -o pipefail
          pod install 2>&1 | tee ../../ci-logs/pod-install.log

      - name: Build unsigned iOS archive
        shell: bash
        run: |
          set -o pipefail
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath "$RUNNER_TEMP/Win12Mobile-CI.xcarchive" \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee ci-logs/ios-build.log

      - name: Package unsigned iOS archive
        if: ${{ success() }}
        run: |
          mkdir -p ci-artifacts/ios
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/Win12Mobile-CI.xcarchive" \
            "ci-artifacts/ios/win12-mobile-pr-${{ github.event.pull_request.number || github.run_number }}-unsigned.xcarchive.zip"

      - name: Upload unsigned iOS archive
        id: ios_package
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-archive
          path: ci-artifacts/ios/*.zip
          if-no-files-found: error
          retention-days: 7

      - name: Upload iOS failure logs
        id: ios_logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-failure-logs
          path: ci-logs/
          if-no-files-found: ignore
          retention-days: 7

  report:
    name: Report result to pull request
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs:
      - android
      - ios
    steps:
      - name: Create or update pull request comment
        uses: actions/github-script@v7
        env:
          ANDROID_RESULT: ${{ needs.android.result }}
          IOS_RESULT: ${{ needs.ios.result }}
          ANDROID_PACKAGE_ID: ${{ needs.android.outputs.package-id }}
          IOS_PACKAGE_ID: ${{ needs.ios.outputs.package-id }}
          ANDROID_LOG_ID: ${{ needs.android.outputs.log-id }}
          IOS_LOG_ID: ${{ needs.ios.outputs.log-id }}
        with:
          script: |
            const marker = '<!-- win12-mobile-pr-build -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = id => `${runUrl}/artifacts/${id}`;
            const succeeded = process.env.ANDROID_RESULT === 'success' && process.env.IOS_RESULT === 'success';
            const lines = [marker, succeeded ? '## ✅ 构建成功' : '## ❌ 构建失败', ''];

            lines.push(`- Android：${process.env.ANDROID_RESULT}`);
            lines.push(`- iOS：${process.env.IOS_RESULT}`);
            lines.push('');

            if (succeeded) {
              lines.push(`- [下载 Android 临时签名安装包](${artifactUrl(process.env.ANDROID_PACKAGE_ID)})`);
              lines.push(`- [下载 iOS 未签名归档](${artifactUrl(process.env.IOS_PACKAGE_ID)})`);
              lines.push('', '> Android APK 仅使用本次 runner 临时生成的 debug 签名，有效期 7 天；未使用 GitHub Actions Secrets 中的私钥。');
            } else {
              if (process.env.ANDROID_LOG_ID) lines.push(`- [下载 Android 失败日志](${artifactUrl(process.env.ANDROID_LOG_ID)})`);
              if (process.env.IOS_LOG_ID) lines.push(`- [下载 iOS 失败日志](${artifactUrl(process.env.IOS_LOG_ID)})`);
              lines.push(`- [查看并下载完整工作流日志](${runUrl})`);
              lines.push('', '> 日志产物保留 7 天。');
            }

            const body = lines.join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const previous = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
