name: Build Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  JAVA_VERSION: "21"
  VERSION_NAME: 0.0.0-ci
  VERSION_CODE: "1"

jobs:
  android:
    name: Android build test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npm run sync

      - name: Build Android debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

  ios:
    name: iOS build test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npm run sync

      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install

      - name: Build unsigned iOS archive
        run: |
          xcodebuild archive \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -archivePath "$RUNNER_TEMP/Win12Mobile-CI.xcarchive" \
            CODE_SIGNING_ALLOWED=NO
